<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Rigging Workshop</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "@codemirror/state":        "https://esm.sh/@codemirror/state@6",
    "@codemirror/view":         "https://esm.sh/@codemirror/view@6",
    "@codemirror/commands":     "https://esm.sh/@codemirror/commands@6",
    "@codemirror/language":     "https://esm.sh/@codemirror/language@6",
    "@codemirror/search":       "https://esm.sh/@codemirror/search@6",
    "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6",
    "@codemirror/lint":         "https://esm.sh/@codemirror/lint@6",
    "@codemirror/lang-json":    "https://esm.sh/@codemirror/lang-json@6",
    "@noble/ed25519":           "https://esm.sh/@noble/ed25519@2"
  }
}
</script>
</head>
<body>

<div class="app">

  <!-- ============ NAV ============ -->
  <header class="nav">
    <a class="brand" href="https://trie.site" target="_blank" rel="noopener">
      <!-- Triangle mark, lifted from the T.R.I.E. Visualizer brand block.
           Two stacked triangles: a soft inked shadow under a thin-stroke
           outlined pair, with a single hash mark dropping from the apex. -->
      <svg class="brand-mark" viewBox="-2 -2 154 92" aria-hidden="true">
        <path d="M 0 0 L 100 0 L 50 86.6 Z" class="tri-shadow"></path>
        <path d="M 100 0 L 50 86.6 L 150 86.6 Z" fill="none" stroke="currentColor" stroke-width="3"></path>
        <path d="M 100 0 L 88.2 86.6" fill="none" stroke="currentColor" stroke-width="3"></path>
      </svg>
      <span class="wordmark">T.R.I.E.</span>
      <small>rigging workshop</small>
    </a>

    <div class="nav-group">
      <input id="url-input" class="input" placeholder="https://… url to .trdl or .toda" />
      <button id="btn-load" class="btn">
        <svg class="ic" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        Load
      </button>
      <button id="btn-open" class="btn">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        Open file
      </button>
      <input id="file-input" type="file" accept=".trdl,.toda" hidden />
    </div>

    <div class="nav-spacer"></div>

    <div class="nav-group">
      <a class="btn" href="disagreement-bench.html">Disagreement bench</a>
      <a class="btn" href="roundtrip-bench.html">Roundtrip bench</a>
    </div>

    <div class="nav-group">
      <button id="btn-save-trdl" class="btn">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14"/></svg>
        Save .trdl
      </button>
      <button id="btn-save-toda" class="btn">
        <svg class="ic" viewBox="0 0 24 24"><path d="M12 21V9m0 0l-4 4m4-4l4 4M5 3h14"/></svg>
        Export .toda
      </button>
    </div>
  </header>

  <!-- ============ GRID ============ -->
  <main class="grid">

    <!-- TL: Editor -->
    <section class="panel" aria-label="TRDL editor">
      <header class="panel-head">
        <span class="panel-title">Editor</span>
        <span class="panel-meta">trdl · jsonl</span>
      </header>
      <div class="panel-body">
        <div id="editor" class="editor-host"></div>
      </div>
    </section>

    <!-- TR: Viz -->
    <section class="panel" aria-label="Visualization">
      <header class="panel-head">
        <span class="panel-title">Visualization</span>
        <span id="viz-meta" class="panel-meta">—</span>
      </header>
      <div class="panel-body">
        <div class="viz-wrap">
          <svg id="viz" preserveAspectRatio="xMidYMid meet"></svg>
          <div class="viz-legend">
            <div class="row"><span class="sw" style="background:#999"></span> prev</div>
            <div class="row"><span class="sw" style="background:#f9f"></span> teth</div>
            <div class="row"><span class="sw" style="background:rgb(61,255,51)"></span> lead</div>
            <div class="row"><span class="sw" style="background:#86f"></span> meet</div>
            <div class="row"><span class="sw" style="background:rgb(255,174,60)"></span> post</div>
            <div class="row"><span class="sw" style="background:rgb(255,0,0)"></span> cargo</div>
          </div>
        </div>
      </div>
    </section>

    <!-- BL: Workshop (rig check + metadata) -->
    <section class="panel" aria-label="Workshop">
      <header class="panel-head">
        <span class="panel-title">Workshop</span>
        <span class="panel-meta">v1</span>
      </header>
      <div class="panel-body stack">
        <div id="rig-meta-section" class="section" hidden>
          <h4 id="rig-meta-filename" class="rig-meta-filename collapsible">
            <span class="chevron">▾</span>
            <span class="section-title">filename.json</span>
            <span class="section-status"></span>
          </h4>
          <div id="rig-meta" class="rig-meta"></div>
        </div>
        <div class="section" id="rig-check-section">
          <h4 class="collapsible">
            <span class="chevron">▾</span>
            <span class="section-title">Rig check</span>
            <span class="section-checkers"></span>
          </h4>
          <div id="rigcheck" class="rig-check warn">
            <span class="badge">IDLE</span>
            <div>Loading…</div>
          </div>
        </div>
        <div class="section rigs-section">
          <h4>Examples</h4>
          <div id="rigs-list" class="rigs-list"></div>
        </div>
      </div>
    </section>

    <!-- BR: Hex viewer -->
    <section class="panel" aria-label="Hex viewer">
      <header class="panel-head">
        <span class="panel-title">Hex</span>
        <span id="meta" class="panel-meta">—</span>
        <div class="hex-toggle" role="group" aria-label="Hex view style">
          <button type="button" data-view="raw">raw</button>
          <button type="button" data-view="kiwanoed">kiwanoed</button>
        </div>
      </header>
      <div class="panel-body">
        <div id="hex" class="hex"><div class="empty">no rig loaded</div></div>
      </div>
    </section>

  </main>
</div>

<script type="module" src="app.js"></script>
<script type="module" src="hex.js"></script>
<script type="module" src="editor.js"></script>
</body>
</html>
